name: Deploy Family Chat Web

on:
  push:
    branches:
      - main

jobs:
  deploy-web:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.41.9"
          cache: true

      - name: Build Flutter web
        env:
          FAMILYCHAT_API_BASE_URL: https://remont-tracker.ru/api/v1/
          FAMILYCHAT_WEB_APP_URL: https://remont-tracker.ru/familychat/app
          FAMILYCHAT_INVITE_BASE_URL: https://remont-tracker.ru
        run: |
          chmod +x scripts/build-web.sh
          scripts/build-web.sh

      - name: Deploy static files via rsync
        uses: burnett01/rsync-deployments@5.2.1
        with:
          switches: -avzr --delete
          path: build_web/
          remote_path: /home/django/myproject/familychat_web/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Reload nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            if sudo nginx -t; then
              sudo systemctl reload nginx
            fi
