name: familychat_app
description: Family Chat — семейный мессенджер с родством.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  dio: ^5.4.3+1
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.5
  path_provider: ^2.1.5
  app_links: ^6.4.0
  url_launcher: ^6.3.1
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.3
  permission_handler: ^11.4.0
  intl: ^0.20.2
  share_plus: ^12.0.2
  web_socket_channel: ^3.0.3
  image_picker: ^1.1.2
  photo_manager: ^3.6.4
  exif: ^3.3.0
  cached_network_image: ^3.4.1
  file_picker: ^8.1.7
  js: ^0.6.7
  emoji_picker_flutter: ^4.3.0
  share_handler: ^0.0.25
  flutter_cache_manager: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/logo/logo.png

# Генерация иконок: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo/logo.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/logo/logo.png
  web:
    generate: true
    image_path: assets/logo/logo.png
    background_color: "#FFFFFF"
    theme_color: "#2E7D32"
